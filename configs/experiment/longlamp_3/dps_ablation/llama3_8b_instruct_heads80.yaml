# @package _global_
defaults:
  - override /model: llama3_8b_instruct
  - override /data: longlamp_3
  - override /decoder: dps

# DPS Ablation Study: 80 preference heads for LongLaMP-3
decoder:
  configs:
    task: LongLaMP-3
    num_preference_heads: 80
    post_softmax: True

model:
  configs:
    max_new_tokens: 256

# Ablation study identifier
ablation:
  study: num_preference_heads
  value: 80
