# @package _global_
defaults:
  - override /model: llama3_8b_instruct
  - override /data: lamp_7
  - override /decoder: dps

# Override decoder configs for LaMP-7
decoder:
  configs:
    task: LaMP-7
    num_preference_heads: 40

model:
  configs:
    max_new_tokens: 64  # Tweets are short, paraphrases similar length
