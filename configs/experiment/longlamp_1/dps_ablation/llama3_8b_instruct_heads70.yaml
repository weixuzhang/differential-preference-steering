# @package _global_
defaults:
  - override /model: llama3_8b_instruct
  - override /data: longlamp_1
  - override /decoder: dps

# DPS Ablation Study: 70 preference heads for LongLaMP-1
decoder:
  configs:
    task: LongLaMP-1
    num_preference_heads: 70
    post_softmax: True

model:
  configs:
    max_new_tokens: 256

# Ablation study identifier
ablation:
  study: num_preference_heads
  value: 70
