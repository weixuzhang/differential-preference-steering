# @package _global_
defaults:
  - override /model: llama3_8b_instruct
  - override /data: lamp_2
  - override /decoder: context_aware_decoding

# Context-Aware Decoding for LaMP-2
decoder:
  configs:
    alpha: 0.5  # Contrastive weight
    post_softmax: True

model:
  configs:
    max_new_tokens: 32
