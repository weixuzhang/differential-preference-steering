# @package _global_
defaults:
  - override /model: llama3_8b_instruct
  - override /data: lamp_5
  - override /decoder: dps

# DPS Ablation Study: 90 preference heads for LaMP-5
decoder:
  configs:
    task: LaMP-5
    num_preference_heads: 90
    post_softmax: True

model:
  configs:
    max_new_tokens: 32

# Ablation study identifier
ablation:
  study: num_preference_heads
  value: 90
